name: Remote Runner (ngrok HTTP)

on:
  workflow_dispatch:
    inputs:
      keep_alive:
        description: 'Minutes to stay alive (max 360)'
        required: false
        default: '60'

env:
  NGROK_AUTHTOKEN: '3GoMs1CMDEWzLBBN9SgfA5DqZg4_2z5DyuaHKjUkPAu5HLAWk'
  REMOTE_API_KEY: 'hacx_remote_2024'

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/keyrings/ngrok.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq ngrok
          ngrok version

      - name: Start Python API server
        run: |
          pip install -q -r scripts/requirements.txt 2>/dev/null || true
          nohup python3 scripts/remote-runner.py > /tmp/api.log 2>&1 &
          sleep 2
          curl -s http://localhost:7860/health
          echo ""

      - name: Start ngrok HTTP tunnel
        run: |
          set +e
          ngrok config add-authtoken "${{ env.NGROK_AUTHTOKEN }}"
          nohup ngrok http 7860 > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          sleep 8
          if ! kill -0 $NGROK_PID 2>/dev/null; then
            echo "ngrok died. Log:"
            cat /tmp/ngrok.log
            exit 1
          fi
          URL=""
          for i in $(seq 1 15); do
            TUNNEL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null)
            URL=$(echo "$TUNNEL" | grep -oP '"public_url":"https://[^"]*"' | head -1 | cut -d'"' -f4)
            if [ -n "$URL" ]; then
              break
            fi
            sleep 2
          done
          if [ -z "$URL" ]; then
            echo "Failed to get ngrok URL. Log:"
            cat /tmp/ngrok.log
            echo "---API response---"
            curl -s http://localhost:4040/api/tunnels
            exit 1
          fi
          echo ""
          echo "============================================"
          echo "  Remote runner is live!"
          echo ""
          echo "  URL: $URL"
          echo "  API Key: ${{ env.REMOTE_API_KEY }}"
          echo ""
          echo "  Test: curl -s $URL/health"
          echo "  Run:  curl -s -X POST -H 'X-Api-Key: ${{ env.REMOTE_API_KEY }}' -H 'Content-Type: application/json' -d '{\"cmd\":\"uname -a\"}' $URL/run"
          echo "============================================"

      - name: Install build tools
        run: |
          node --version
          npm --version
          npx --version

      - name: Keep alive
        run: |
          MINS=${{ github.event.inputs.keep_alive }}
          echo "Runner alive for $MINS minutes."
          for i in $(seq 1 $((MINS * 6))); do
            [ -f /tmp/done ] && { echo "Done."; exit 0; }
            sleep 10
          done
