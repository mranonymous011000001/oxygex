name: Build Server (Headless Receiver)

on:
  push:
    branches: [main, master]
    paths:
      - 'oxygex-server/**'
      - '.github/workflows/build-server.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libvpx-dev libyuv-dev libaom-dev \
            libxi-dev libxtst-dev libxfixes-dev libxdamage-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxrender-dev libxcomposite-dev \
            libxext-dev libx11-dev libxdo-dev libxkbcommon-dev \
            libxcb-randr0-dev libxcb-shm0-dev libxcb1-dev libxau-dev libxdmcp-dev \
            libclang-dev libsodium-dev \
            libgtk-3-dev libglib2.0-dev libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf-2.0-dev libatk1.0-dev libatk-bridge2.0-dev \
            libharfbuzz-dev libfreetype-dev libfontconfig1-dev libxml2-dev \
            libxft-dev libegl-dev libgl-dev libgles-dev libglvnd-dev \
            libwayland-dev libcloudproviders-dev libatspi2.0-dev libdbus-1-dev \
            libpam0g-dev liborc-0.4-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libunwind-dev \
            libpulse-dev libssl-dev pkg-config cmake nasm yasm

      - name: Create libyuv.pc (Ubuntu doesn't ship one)
        run: |
          sudo tee /usr/lib/x86_64-linux-gnu/pkgconfig/libyuv.pc > /dev/null <<'EOF'
          prefix=/usr
          exec_prefix=${prefix}/lib/x86_64-linux-gnu
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: libyuv
          Description: YUV scaling and conversion library
          Version: 0.0
          Libs: -L${libdir} -lyuv
          Cflags: -I${includedir}
          EOF
          pkg-config --cflags --libs libyuv

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oxygex-server/target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('oxygex-server/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-server-

      - name: Build server (Linux)
        working-directory: oxygex-server
        env:
          SODIUM_SHARED: "1"
          SODIUM_USE_PKG_CONFIG: "1"
        run: cargo build --release

      - name: Strip binary
        working-directory: oxygex-server
        run: strip target/release/oxygex-server || true

      - name: Rename binary
        run: |
          mkdir -p artifacts
          cp oxygex-server/target/release/oxygex-server artifacts/oxygex-server-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxygex-server-linux-x86_64
          path: artifacts/oxygex-server-linux-x86_64
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe install libvpx:x64-windows-static libyuv:x64-windows-static aom:x64-windows-static opus:x64-windows-static
        shell: cmd

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            oxygex-server/target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('oxygex-server/**/Cargo.toml') }}

      - name: Build server (Windows)
        working-directory: oxygex-server
        env:
          VCPKG_ROOT: C:\vcpkg
        run: cargo build --release

      - name: Rename binary
        run: |
          mkdir -p artifacts
          copy oxygex-server\target\release\oxygex-server.exe artifacts\oxygex-server-windows-x86_64.exe
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxygex-server-windows-x86_64
          path: artifacts/oxygex-server-windows-x86_64.exe
          if-no-files-found: error

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-${{ github.run_number }}
          name: Oxygex Server Build ${{ github.run_number }}
          files: |
            artifacts/oxygex-server-linux-x86_64/oxygex-server-linux-x86_64
            artifacts/oxygex-server-windows-x86_64/oxygex-server-windows-x86_64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
